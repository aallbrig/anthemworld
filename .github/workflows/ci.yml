name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Go CLI: build + test ────────────────────────────────────────────────────
  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli/worldanthem
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build -ldflags="-X main.version=ci-$(git rev-parse --short HEAD)" ./...

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  # ── Hugo: build static site ─────────────────────────────────────────────────
  hugo:
    name: Hugo build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: false

      - name: Build
        run: hugo --minify
        working-directory: hugo/site

  # ── Playwright: end-to-end tests ────────────────────────────────────────────
  playwright:
    name: Playwright (Firefox)
    runs-on: ubuntu-latest
    needs: [hugo]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Hugo (for webServer)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: false

      - name: Install Playwright deps
        working-directory: tests/playwright
        run: npm ci

      - name: Install Firefox browser
        working-directory: tests/playwright
        run: npx playwright install --with-deps firefox

      - name: Run tests
        working-directory: tests/playwright
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright/playwright-report/
          retention-days: 7

  # ── SAM: validate template ───────────────────────────────────────────────────
  sam-validate:
    name: SAM validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for SAM CLI)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Install Node deps for SAM
        working-directory: sam/game/functions
        run: npm ci

      - name: Validate SAM template
        working-directory: sam/game
        run: sam validate --lint
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
